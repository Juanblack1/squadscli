<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-ancestors 'none';" />
    <title>Software Factory Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar panel">
        <div class="brand-block">
          <div class="brand-mark">SF</div>
          <div>
            <p class="eyebrow">software-factory</p>
            <h1>Workbench</h1>
          </div>
        </div>

        <section class="sidebar-section workspace-section">
          <div class="section-topline">
            <span class="mini-label">workspace</span>
            <button id="choose-folder" class="ghost tiny">Trocar</button>
          </div>
          <strong id="workspace-name" class="workspace-name">Carregando...</strong>
          <p id="workspace-path" class="workspace-path">Aguardando caminho</p>
          <div class="sidebar-actions">
            <button id="refresh-workspace" class="secondary">Atualizar</button>
            <button id="run-doctor" class="ghost">Doctor</button>
          </div>
        </section>

        <section class="sidebar-section nav-section">
          <div class="section-topline">
            <span class="mini-label">views</span>
          </div>
          <nav class="sidebar-nav">
            <button class="nav-pill active" data-view="home">Home</button>
            <button class="nav-pill" data-view="providers">Providers</button>
            <button class="nav-pill" data-view="workflows">Workflows</button>
            <button class="nav-pill" data-view="runs">Runs</button>
            <button class="nav-pill" data-view="memory">Memory</button>
            <button class="nav-pill" data-view="sessions">Sessions</button>
          </nav>
        </section>

        <section class="sidebar-section history-section">
          <div class="section-topline">
            <span class="mini-label">recent sessions</span>
          </div>
          <div id="sidebar-sessions" class="sidebar-list"></div>
        </section>
      </aside>

      <main class="center-column">
        <header class="topbar panel">
          <div>
            <p id="view-kicker" class="eyebrow dim">home</p>
            <h2 id="view-title">Visão geral</h2>
          </div>
          <div class="topbar-meta">
            <span id="default-provider" class="meta-chip">default</span>
            <span id="status-badge" class="meta-chip idle">idle</span>
          </div>
        </header>

        <section class="thread panel">
          <div class="thread-header">
            <div>
              <p class="eyebrow dim">context thread</p>
              <h3 id="thread-title">Workspace pronto</h3>
            </div>
            <div class="metrics-row">
              <div class="metric-pill">
                <span class="metric-value" id="ready-count">0</span>
                <span class="metric-label">providers</span>
              </div>
              <div class="metric-pill">
                <span class="metric-value" id="workflow-count">0</span>
                <span class="metric-label">workflows</span>
              </div>
              <div class="metric-pill">
                <span class="metric-value" id="run-count">0</span>
                <span class="metric-label">runs</span>
              </div>
            </div>
          </div>

          <div id="view-content" class="view-stream"></div>
          <div id="feed" class="activity-stream"></div>
        </section>

        <section class="composer panel">
          <div class="composer-header">
            <div>
              <p class="eyebrow dim">composer</p>
              <h3>Nova rodada</h3>
            </div>
            <button id="run-button" class="primary">Rodar agora</button>
          </div>

          <div class="composer-grid">
            <label>
              <span>Provider</span>
              <select id="provider-select"></select>
            </label>
            <label>
              <span>Model</span>
              <select id="model-select"></select>
            </label>
            <label>
              <span>Stage</span>
              <select id="stage-select">
                <option value="full-run">full-run</option>
                <option value="prd">prd</option>
                <option value="techspec">techspec</option>
                <option value="tasks">tasks</option>
                <option value="review">review</option>
                <option value="autonomy">autonomy</option>
              </select>
            </label>
            <label>
              <span>Effort</span>
              <select id="effort-select">
                <option value="lite">lite</option>
                <option value="balanced">balanced</option>
                <option value="deep">deep</option>
              </select>
            </label>
          </div>

          <div class="composer-grid single-row">
            <label>
              <span>Workflow</span>
              <input id="workflow-input" type="text" placeholder="onboarding ou vazio para auto" />
            </label>
            <label>
              <span>Skills focadas</span>
              <input id="skills-input" type="text" placeholder="api-design,code-review" />
            </label>
          </div>

          <label class="checkbox-row">
            <input id="dry-run-input" type="checkbox" />
            <span>Executar em dry-run</span>
          </label>

          <label class="composer-brief">
            <span>Brief</span>
            <textarea id="brief-input" placeholder="Descreva o objetivo da rodada para este workspace..."></textarea>
          </label>
        </section>
      </main>

      <aside class="context-column panel">
        <div class="context-header">
          <p class="eyebrow dim">inspector</p>
          <h3>Contexto operacional</h3>
        </div>

        <section class="context-section">
          <div class="section-topline">
            <span class="mini-label">providers</span>
          </div>
          <div id="inspector-providers" class="inspector-list"></div>
        </section>

        <section class="context-section">
          <div class="section-topline">
            <span class="mini-label">workflows</span>
          </div>
          <div id="inspector-workflows" class="inspector-list"></div>
        </section>

        <section class="context-section grow">
          <div class="section-topline">
            <span class="mini-label">memory + handoffs</span>
          </div>
          <div id="inspector-memory" class="inspector-list"></div>
        </section>
      </aside>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
